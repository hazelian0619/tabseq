train:
  dataset: diamonds
  seed: 0
  val_size: 0.2
  batch_size: 128
  epochs: 60
  lr: 0.001
  weight_decay: 0.0001
  depth: 6
  binning_strategy: uniform
  encoder_type: ft_transformer
  d_model: 64
  n_heads: 4
  n_layers: 2
  dropout: 0.1
  confidence: 0.9
  confidence_grid: [0.86, 0.87, 0.88, 0.89, 0.9, 0.91, 0.92, 0.93, 0.94, 0.95, 0.96, 0.97, 0.98]
  temperature: 1.0
  interval_method: relaxed_mass
  peak_merge_alpha: 0.33
  mask_outside: 0.0
  beam_size: 8
  leaf_prior_weight: 0.0
  selection_warmup_epochs: 10
  out_root: outputs
  run_id:
  device: cuda:0
  num_workers: 0
  width_bins: [0.0, 10.0, 20.0, 40.0, 80.0, 120.0, 1000.0]
  bin_step_02: 10.0
  bin_step_04: 20.0

eval:
  batch_size: 256
  confidence: 0.9
  confidence_grid: [0.86, 0.87, 0.88, 0.89, 0.9, 0.91, 0.92, 0.93, 0.94, 0.95, 0.96, 0.97, 0.98]
  temperature: 1.0
  interval_method: relaxed_mass
  peak_merge_alpha: 0.33
  mode: both
  mask_outside: 0.0
  beam_size: 8
  leaf_prior_weight: 0.0
  width_bins: [0.0, 10.0, 20.0, 40.0, 80.0, 120.0, 1000.0]
  bin_step_02: 10.0
  bin_step_04: 20.0
  scale_diagnostics: false
  ref_range: 321.0
  export_leaf_probs: false
  export_samples: 0

prefix_search:
  batch_size: 64
  confidence: 0.9
  temperature: 1.0
  interval_method: cdf
  peak_merge_alpha: 0.33
  mode: both
  beam_size: 8
  max_samples: 0
  device: cpu
  export_leaf_probs: false
  export_samples: 0
